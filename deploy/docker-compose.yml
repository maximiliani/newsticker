services:
  db:
    image: supabase/postgres:15.1.0.147
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./volumes/db/init:/docker-entrypoint-initdb.d
      - ./volumes/db/data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"

  kong:
    image: kong:2.8.1
    restart: always
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    volumes:
      - ./kong.yml:/var/lib/kong/kong.yml
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  auth:
    image: supabase/gotrue:v2.132.3
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL:-http://localhost:3000}
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000/auth/v1}
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_URI_ALLOW_LIST: "*"

  rest:
    image: postgrest/postgrest:v12.0.1
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMA: public,storage,auth
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}

  realtime:
    image: supabase/realtime:v2.25.26
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      JWT_SECRET: ${JWT_SECRET}
      REPLICATION_MODE: RLS
      REPLICATION_SLOT_NAME: supabase_realtime_rc
      PUBLICATION_NAME: supabase_realtime

  storage:
    image: supabase/storage-api:v0.43.12
    depends_on:
      db:
        condition: service_healthy
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FILE_STORAGE_BACKEND: file
      FILE_PATH: /var/lib/storage
    volumes:
      - ./volumes/storage:/var/lib/storage

  imgproxy:
    image: darthsim/imgproxy:v3.19.0
    environment:
      IMGPROXY_BIND: :5001

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      INTERNAL_ADMIN_SECRET: ${INTERNAL_ADMIN_SECRET}
      NEXT_PUBLIC_KIOSK_MODE: ${NEXT_PUBLIC_KIOSK_MODE}
      HOST_AGENT_URL: ${HOST_AGENT_URL:-http://host.docker.internal:9876}
      HOST_AGENT_SECRET: ${HOST_AGENT_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      kong:
        condition: service_started
      db:
        condition: service_healthy
